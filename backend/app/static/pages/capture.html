<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AR Capture Guide - Dermalyze</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1 id="capture-title">AR Capture Guide</h1>
  </div>
  <main>
    <p class="center-note" id="guide-hint" style="padding-top:0;">
      Align a coin with the reference circle, and center the lesion in the middle circle
    </p>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline muted style="display:none"></video>
      <img id="file-preview" style="display:none" />
      <canvas id="overlay"></canvas>
    </div>

    <div id="camera-error" class="error-msg" style="margin-top:10px;"></div>

    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" />

    <button class="shutter-btn" id="shutter-btn" title="Capture"></button>
    <button class="btn secondary" id="file-btn">📁 Upload / Take Photo</button>

    <div id="uploading" style="display:none" class="center-note">
      <div class="spinner"></div>
      AI is analyzing the image...
    </div>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/capture.js"></script>
</body>
</html>
