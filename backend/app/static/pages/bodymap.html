<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>신체 지도 - Skin Watch AR</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>신체 지도</h1>
    <button class="back-btn" id="logout-btn" title="로그아웃">⎋</button>
  </div>
  <main>
    <div class="legend">
      <span><span class="dot none"></span>등록 없음</span>
      <span><span class="dot low"></span>관찰 중</span>
      <span><span class="dot high"></span>긴급 확인 필요</span>
    </div>

    <div class="grid-2" style="margin-bottom:10px;">
      <button class="btn outline" id="tab-front" style="margin-top:0">앞면</button>
      <button class="btn outline" id="tab-back" style="margin-top:0">뒷면</button>
    </div>

    <div class="bodymap-wrap">
      <svg id="svg-front" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg">
        <circle class="body-part" data-part="head" cx="100" cy="26" r="20"></circle>
        <rect class="body-part" data-part="neck" x="90" y="44" width="20" height="12" rx="4"></rect>
        <rect class="body-part" data-part="chest" x="62" y="56" width="76" height="52" rx="14"></rect>
        <rect class="body-part" data-part="abdomen" x="66" y="108" width="68" height="42" rx="10"></rect>
        <rect class="body-part" data-part="left_upper_arm" x="28" y="58" width="26" height="66" rx="12"></rect>
        <rect class="body-part" data-part="left_forearm" x="22" y="124" width="24" height="60" rx="10"></rect>
        <rect class="body-part" data-part="right_upper_arm" x="146" y="58" width="26" height="66" rx="12"></rect>
        <rect class="body-part" data-part="right_forearm" x="154" y="124" width="24" height="60" rx="10"></rect>
        <rect class="body-part" data-part="left_thigh" x="68" y="150" width="30" height="76" rx="12"></rect>
        <rect class="body-part" data-part="right_thigh" x="102" y="150" width="30" height="76" rx="12"></rect>
        <rect class="body-part" data-part="left_lower_leg" x="70" y="226" width="26" height="72" rx="10"></rect>
        <rect class="body-part" data-part="right_lower_leg" x="104" y="226" width="26" height="72" rx="10"></rect>

        <g fill="#1c2b28" font-size="8" font-weight="600" text-anchor="middle" pointer-events="none">
          <text x="100" y="29">머리</text>
          <text x="100" y="86">가슴</text>
          <text x="100" y="132">복부</text>
          <text x="41" y="94">왼위팔</text>
          <text x="34" y="157">왼아래팔</text>
          <text x="159" y="94">오위팔</text>
          <text x="166" y="157">오아래팔</text>
          <text x="83" y="191">왼허벅지</text>
          <text x="117" y="191">오허벅지</text>
          <text x="83" y="265">왼종아리</text>
          <text x="117" y="265">오종아리</text>
        </g>
      </svg>

      <svg id="svg-back" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <rect class="body-part" data-part="back" x="46" y="50" width="108" height="140" rx="20"></rect>
        <text x="100" y="124" fill="#1c2b28" font-size="11" font-weight="600" text-anchor="middle" pointer-events="none">등 전체</text>
      </svg>
    </div>

    <div id="part-panel" class="card" style="display:none">
      <h3 id="part-title" style="margin:0 0 10px;"></h3>
      <div id="part-lesions"></div>
      <button class="btn" id="add-lesion-btn">+ 새 병변 등록</button>
    </div>
    <p class="center-note" id="empty-hint">신체 부위를 탭해서 병변을 등록하거나 히스토리를 확인하세요</p>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/bodymap.js"></script>
</body>
</html>
