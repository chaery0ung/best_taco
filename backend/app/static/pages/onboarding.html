<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Profile - Dermalyze</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="topbar"><h1>Basic Info</h1></div>
  <main>
    <p class="center-note" style="text-align:left; padding-top:0;">We need a couple of details for accurate analysis.</p>
    <div class="card">
      <label for="age">Age</label>
      <input type="number" id="age" min="1" max="120" placeholder="e.g. 34" />

      <label for="gender">Gender</label>
      <select id="gender">
        <option value="Female">Female</option>
        <option value="Male">Male</option>
        <option value="Other">Other</option>
      </select>

      <button class="btn" id="save-btn">Next</button>
      <div class="error-msg" id="onboarding-error"></div>
    </div>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/onboarding.js"></script>
</body>
</html>
