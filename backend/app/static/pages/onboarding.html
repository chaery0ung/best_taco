<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>프로필 입력 - Dermalyze</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="topbar"><h1>기본 정보 입력</h1></div>
  <main>
    <p class="center-note" style="text-align:left; padding-top:0;">정확한 분석을 위해 몇 가지 정보가 필요해요.</p>
    <div class="card">
      <label for="age">나이</label>
      <input type="number" id="age" min="1" max="120" placeholder="예: 34" />

      <label for="gender">성별</label>
      <select id="gender">
        <option value="여성">여성</option>
        <option value="남성">남성</option>
        <option value="기타">기타</option>
      </select>

      <button class="btn" id="save-btn">다음</button>
      <div class="error-msg" id="onboarding-error"></div>
    </div>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/onboarding.js"></script>
</body>
</html>
