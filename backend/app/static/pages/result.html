<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analysis Result - Dermalyze</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back-btn" onclick="window.location.href='/bodymap.html'">←</button>
    <h1>Analysis Result</h1>
  </div>
  <main>
    <div id="loading" class="spinner"></div>
    <div id="content" style="display:none">
      <div class="card">
        <div class="result-hero">
          <img id="orig-img" alt="Original photo" />
          <img id="heatmap-img" alt="AI heatmap" />
        </div>
        <p class="center-note" style="padding:6px 0 0;">Original Photo · AI Heatmap</p>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div id="classification" style="font-size:17px; font-weight:700;"></div>
            <div class="meta" id="confidence" style="color:var(--text-muted); font-size:13px; margin-top:4px;"></div>
          </div>
          <span id="urgency-pill" class="pill"></span>
        </div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 8px; font-size:14px; color:var(--text-muted);">Gemini AI Report</h3>
        <div class="report-text" id="gemini-report"></div>
      </div>

      <div id="high-urgency-block" style="display:none">
        <button class="btn danger" onclick="window.location.href='/clinics.html'">🏥 Find Nearby Dermatologists</button>
        <button class="btn secondary" id="pdf-btn">📄 Save PDF Report</button>
      </div>
      <div id="low-urgency-block" style="display:none">
        <button class="btn secondary" id="pdf-btn-low">📄 Save PDF Report</button>
      </div>
    </div>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/result.js"></script>
</body>
</html>
