<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dermalyze</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="logo">🩺</div>
    <h1>Dermalyze</h1>
    <p>Select a body part, capture a photo, and get an instant AI skin analysis</p>
  </div>
  <main>
    <div class="card">
      <div id="login-form">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
        <button class="btn" id="login-btn">Log In</button>
        <div class="error-msg" id="login-error"></div>
        <div class="link-row">Don't have an account? <a href="#" id="show-signup">Sign Up</a></div>
      </div>

      <div id="signup-form" style="display:none">
        <label for="signup-name">Name</label>
        <input type="text" id="signup-name" placeholder="Jane Doe" />
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="8+ characters" />
        <button class="btn" id="signup-btn">Sign Up</button>
        <div class="error-msg" id="signup-error"></div>
        <div class="link-row">Already have an account? <a href="#" id="show-login">Log In</a></div>
      </div>
    </div>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
