<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skin Watch AR</title>
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
<div class="app">
  <div class="brand">
    <div class="logo">🩺</div>
    <h1>Skin Watch AR</h1>
    <p>AR 가이드로 촬영하고, 병변 변화를 지도처럼 관리하세요</p>
  </div>
  <main>
    <div class="card">
      <div id="login-form">
        <label for="login-email">이메일</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
        <label for="login-password">비밀번호</label>
        <input type="password" id="login-password" placeholder="••••••••" />
        <button class="btn" id="login-btn">로그인</button>
        <div class="error-msg" id="login-error"></div>
        <div class="link-row">계정이 없으신가요? <a href="#" id="show-signup">회원가입</a></div>
      </div>

      <div id="signup-form" style="display:none">
        <label for="signup-name">이름</label>
        <input type="text" id="signup-name" placeholder="홍길동" />
        <label for="signup-email">이메일</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
        <label for="signup-password">비밀번호</label>
        <input type="password" id="signup-password" placeholder="8자 이상" />
        <button class="btn" id="signup-btn">회원가입</button>
        <div class="error-msg" id="signup-error"></div>
        <div class="link-row">이미 계정이 있으신가요? <a href="#" id="show-login">로그인</a></div>
      </div>
    </div>
  </main>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
