services:
  - type: web
    name: skin-watch-ar
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skin-watch-ar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: skin-watch-ar-db
    plan: free
