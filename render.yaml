services:
  - type: web
    name: dermalyze
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: dermalyze-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: dermalyze-db
    plan: free
